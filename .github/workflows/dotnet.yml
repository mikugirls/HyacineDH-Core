# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

env: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: write
  contents: write

on:
  push:
    paths: [ "**.cs" ]
  pull_request:
    paths: [ "**.cs" ]
  workflow_dispatch:
  
jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish win-x64
      run: dotnet publish Program\Program.csproj -o Release\win-x64 -r win-x64 --framework net9.0 -p:PublishSingleFile=true

    - name: Publish linux-x64
      run: dotnet publish Program\Program.csproj -o Release\linux-x64 -r linux-x64 --framework net9.0 -p:PublishSingleFile=true

    - name: Publish linux-arm64
      run: dotnet publish Program\Program.csproj -o Release\linux-arm64 -r linux-arm64 --framework net9.0 -p:PublishSingleFile=true

    - name: Upload win-x64 Build Artifact
      uses: actions/upload-artifact@v4.6.2
      with:
        name: HyacineDH-win-64
        path: Release\win-x64

    - name: Upload linux-x64 Build Artifact
      uses: actions/upload-artifact@v4.6.2
      with:
        name: HyacineDH-linux-x64
        path: Release\linux-x64

    - name: Upload linux-arm64 Build Artifact
      uses: actions/upload-artifact@v4.6.2
      with:
        name: HyacineDH-linux-arm64
        path: Release\linux-arm64
